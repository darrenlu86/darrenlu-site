<svg xmlns="http://www.w3.org/2000/svg" width="720" height="620" viewBox="0 0 720 620">
  <rect width="720" height="620" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow-d3" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#7C9885"/>
    </marker>
    <marker id="arrow-r3" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#7C9885"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="40" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="22" font-weight="bold" fill="#2D2D2D" text-anchor="middle">軟體產品架構全貌</text>

  <!-- 使用者 -->
  <rect x="260" y="60" width="200" height="45" rx="22" fill="#7C9885"/>
  <text x="360" y="88" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">使用者</text>

  <line x1="360" y1="105" x2="360" y2="130" stroke="#7C9885" stroke-width="2" marker-end="url(#arrow-d3)"/>

  <!-- 前端 -->
  <rect x="210" y="137" width="300" height="50" rx="12" fill="#B8C5B2"/>
  <text x="360" y="167" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D" text-anchor="middle">前端 Frontend</text>

  <line x1="360" y1="187" x2="360" y2="212" stroke="#7C9885" stroke-width="2" marker-end="url(#arrow-d3)"/>

  <!-- 後端 -->
  <rect x="210" y="219" width="300" height="50" rx="12" fill="#B8C5B2"/>
  <text x="360" y="249" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D" text-anchor="middle">後端 Backend</text>

  <!-- 後端向下到資料庫 -->
  <line x1="360" y1="269" x2="360" y2="310" stroke="#7C9885" stroke-width="2" marker-end="url(#arrow-d3)"/>

  <!-- 後端向右到第三方服務 -->
  <line x1="510" y1="244" x2="530" y2="244" stroke="#7C9885" stroke-width="2" marker-end="url(#arrow-r3)"/>

  <!-- 資料庫 -->
  <rect x="210" y="317" width="300" height="50" rx="12" fill="#B8C5B2"/>
  <text x="360" y="347" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D" text-anchor="middle">資料庫 Database</text>

  <!-- 第三方服務 -->
  <rect x="540" y="219" width="150" height="50" rx="12" fill="#E8E2DA"/>
  <text x="615" y="240" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" font-weight="bold" fill="#2D2D2D" text-anchor="middle">第三方服務</text>
  <text x="615" y="258" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="11" fill="#7C9885" text-anchor="middle">AI、金流、Email</text>

  <!-- 部署平台 -->
  <line x1="360" y1="367" x2="360" y2="405" stroke="#7C9885" stroke-width="2" marker-end="url(#arrow-d3)"/>

  <rect x="140" y="412" width="440" height="50" rx="12" fill="#F5F2EF" stroke="#E8E2DA" stroke-width="1.5"/>
  <text x="360" y="442" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D" text-anchor="middle">部署平台 — Cloudflare / Cloud Run / Vercel</text>

  <!-- 監控 -->
  <line x1="360" y1="462" x2="360" y2="495" stroke="#7C9885" stroke-width="2" marker-end="url(#arrow-d3)"/>

  <rect x="210" y="502" width="300" height="45" rx="12" fill="#F5F2EF" stroke="#E8E2DA" stroke-width="1.5"/>
  <text x="360" y="530" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="15" font-weight="bold" fill="#2D2D2D" text-anchor="middle">監控 Monitoring</text>

  <!-- Note -->
  <text x="360" y="570" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="12" fill="#7C9885" text-anchor="middle" font-style="italic">每一層各司其職，透過 API 互相溝通</text>
</svg>