<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360">
  <rect width="720" height="360" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="360" y="40" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="22" font-weight="bold" fill="#2D2D2D" text-anchor="middle">前端技術光譜</text>

  <!-- Spectrum line -->
  <line x1="80" y1="140" x2="640" y2="140" stroke="#B8C5B2" stroke-width="4" stroke-linecap="round"/>

  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="spectrum-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B8C5B2"/>
      <stop offset="50%" stop-color="#7C9885"/>
      <stop offset="100%" stop-color="#2D2D2D"/>
    </linearGradient>
  </defs>
  <line x1="80" y1="140" x2="640" y2="140" stroke="url(#spectrum-grad)" stroke-width="6" stroke-linecap="round"/>

  <!-- Left: 簡單 -->
  <circle cx="120" cy="140" r="10" fill="#B8C5B2" stroke="#FFFFFF" stroke-width="2"/>
  <text x="120" y="105" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="14" font-weight="bold" fill="#2D2D2D" text-anchor="middle">簡單</text>
  <rect x="30" y="170" width="180" height="70" rx="10" fill="#F5F2EF" stroke="#E8E2DA" stroke-width="1"/>
  <text x="120" y="195" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="14" font-weight="bold" fill="#2D2D2D" text-anchor="middle">純 HTML/CSS/JS</text>
  <text x="120" y="218" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="12" fill="#7C9885" text-anchor="middle">適合靜態網站、個人頁面</text>

  <!-- Middle: React/Vue -->
  <circle cx="360" cy="140" r="10" fill="#7C9885" stroke="#FFFFFF" stroke-width="2"/>
  <rect x="265" y="170" width="190" height="70" rx="10" fill="#F5F2EF" stroke="#E8E2DA" stroke-width="1"/>
  <text x="360" y="195" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="14" font-weight="bold" fill="#2D2D2D" text-anchor="middle">React / Vue</text>
  <text x="360" y="218" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="12" fill="#7C9885" text-anchor="middle">適合互動多的應用程式</text>

  <!-- Right: 複雜 -->
  <circle cx="600" cy="140" r="10" fill="#2D2D2D" stroke="#FFFFFF" stroke-width="2"/>
  <text x="600" y="105" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="14" font-weight="bold" fill="#2D2D2D" text-anchor="middle">複雜</text>
  <rect x="505" y="170" width="190" height="70" rx="10" fill="#F5F2EF" stroke="#E8E2DA" stroke-width="1"/>
  <text x="600" y="195" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="14" font-weight="bold" fill="#2D2D2D" text-anchor="middle">Next.js / Nuxt</text>
  <text x="600" y="218" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="12" fill="#7C9885" text-anchor="middle">適合需要 SEO 的產品</text>

  <!-- Labels -->
  <text x="80" y="280" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="12" fill="#7C9885">學習門檻低</text>
  <text x="580" y="280" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="12" fill="#7C9885">功能最完整</text>

  <!-- Bottom note -->
  <text x="360" y="310" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#7C9885" text-anchor="middle" font-style="italic">越往右功能越多，但學習成本也越高 — AI 可以幫你處理複雜度</text>
</svg>