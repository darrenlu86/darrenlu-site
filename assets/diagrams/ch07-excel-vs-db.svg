<svg xmlns="http://www.w3.org/2000/svg" width="720" height="480" viewBox="0 0 720 480">
  <rect width="720" height="480" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="360" y="40" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="22" font-weight="bold" fill="#2D2D2D" text-anchor="middle">Excel vs 資料庫</text>

  <!-- Excel icon area -->
  <rect x="60" y="70" width="270" height="140" rx="16" fill="#F5F2EF" stroke="#E8E2DA" stroke-width="1.5"/>
  <!-- Mini spreadsheet -->
  <rect x="120" y="90" width="150" height="100" rx="4" fill="#FFFFFF" stroke="#B8C5B2" stroke-width="1"/>
  <line x1="120" y1="115" x2="270" y2="115" stroke="#E8E2DA" stroke-width="1"/>
  <line x1="120" y1="140" x2="270" y2="140" stroke="#E8E2DA" stroke-width="1"/>
  <line x1="120" y1="165" x2="270" y2="165" stroke="#E8E2DA" stroke-width="1"/>
  <line x1="170" y1="90" x2="170" y2="190" stroke="#E8E2DA" stroke-width="1"/>
  <line x1="220" y1="90" x2="220" y2="190" stroke="#E8E2DA" stroke-width="1"/>
  <text x="195" y="108" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="12" fill="#7C9885" text-anchor="middle">Excel 試算表</text>

  <!-- Database icon area -->
  <rect x="390" y="70" width="270" height="140" rx="16" fill="#F5F2EF" stroke="#E8E2DA" stroke-width="1.5"/>
  <!-- DB cylinder -->
  <ellipse cx="525" cy="110" rx="45" ry="15" fill="#B8C5B2" stroke="#7C9885" stroke-width="1.5"/>
  <rect x="480" y="110" width="90" height="55" fill="#B8C5B2" stroke="none"/>
  <line x1="480" y1="110" x2="480" y2="165" stroke="#7C9885" stroke-width="1.5"/>
  <line x1="570" y1="110" x2="570" y2="165" stroke="#7C9885" stroke-width="1.5"/>
  <ellipse cx="525" cy="165" rx="45" ry="15" fill="#B8C5B2" stroke="#7C9885" stroke-width="1.5"/>
  <text x="525" y="145" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="12" fill="#2D2D2D" text-anchor="middle">資料庫</text>

  <!-- VS -->
  <text x="360" y="148" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="20" font-weight="bold" fill="#7C9885" text-anchor="middle">VS</text>

  <!-- Comparison table -->
  <!-- Header -->
  <rect x="60" y="230" width="180" height="40" rx="8" fill="#7C9885"/>
  <text x="150" y="256" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">比較項目</text>
  <rect x="250" y="230" width="200" height="40" rx="8" fill="#7C9885"/>
  <text x="350" y="256" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Excel</text>
  <rect x="460" y="230" width="200" height="40" rx="8" fill="#7C9885"/>
  <text x="560" y="256" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">資料庫</text>

  <!-- Row 1: 併發 -->
  <rect x="60" y="280" width="180" height="35" rx="6" fill="#F5F2EF"/>
  <text x="150" y="303" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#2D2D2D" text-anchor="middle">多人同時使用</text>
  <rect x="250" y="280" width="200" height="35" rx="6" fill="#F5F2EF"/>
  <text x="350" y="303" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#2D2D2D" text-anchor="middle">容易衝突覆蓋</text>
  <rect x="460" y="280" width="200" height="35" rx="6" fill="#F5F2EF"/>
  <text x="560" y="303" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#7C9885" text-anchor="middle">安全處理併發</text>

  <!-- Row 2: 權限 -->
  <rect x="60" y="322" width="180" height="35" rx="6" fill="#FFFFFF" stroke="#E8E2DA" stroke-width="1"/>
  <text x="150" y="345" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#2D2D2D" text-anchor="middle">權限控制</text>
  <rect x="250" y="322" width="200" height="35" rx="6" fill="#FFFFFF" stroke="#E8E2DA" stroke-width="1"/>
  <text x="350" y="345" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#2D2D2D" text-anchor="middle">整個檔案共享</text>
  <rect x="460" y="322" width="200" height="35" rx="6" fill="#FFFFFF" stroke="#E8E2DA" stroke-width="1"/>
  <text x="560" y="345" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#7C9885" text-anchor="middle">可控制到每一欄</text>

  <!-- Row 3: 規則 -->
  <rect x="60" y="364" width="180" height="35" rx="6" fill="#F5F2EF"/>
  <text x="150" y="387" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#2D2D2D" text-anchor="middle">資料驗證規則</text>
  <rect x="250" y="364" width="200" height="35" rx="6" fill="#F5F2EF"/>
  <text x="350" y="387" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#2D2D2D" text-anchor="middle">容易填錯格式</text>
  <rect x="460" y="364" width="200" height="35" rx="6" fill="#F5F2EF"/>
  <text x="560" y="387" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#7C9885" text-anchor="middle">強制檢查格式正確</text>

  <!-- Row 4: 持久性 -->
  <rect x="60" y="406" width="180" height="35" rx="6" fill="#FFFFFF" stroke="#E8E2DA" stroke-width="1"/>
  <text x="150" y="429" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#2D2D2D" text-anchor="middle">資料持久性</text>
  <rect x="250" y="406" width="200" height="35" rx="6" fill="#FFFFFF" stroke="#E8E2DA" stroke-width="1"/>
  <text x="350" y="429" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#2D2D2D" text-anchor="middle">檔案遺失就沒了</text>
  <rect x="460" y="406" width="200" height="35" rx="6" fill="#FFFFFF" stroke="#E8E2DA" stroke-width="1"/>
  <text x="560" y="429" font-family="PingFang TC, Noto Sans TC, sans-serif" font-size="13" fill="#7C9885" text-anchor="middle">自動備份與恢復</text>
</svg>